<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SE Meditations">
  <meta name="theme-color" content="#1d6083">
  <title>Sacred Engagement — Meditations</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ─── Auth Screen ──────────────────────────────────────────────────────────── -->
<div id="auth-screen">

  <div class="auth-page">

    <!-- Logo header -->
    <div class="auth-header">
      <img src="/logo.png" alt="Sacred Engagement" class="auth-header-logo">
      <p class="auth-header-sub">Module 2 — Meditations</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div id="auth-error" class="auth-error"></div>

      <!-- Login view (default) -->
      <div id="view-login">
        <h2 class="auth-heading">Sign in</h2>
        <form class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com"
              autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••"
              autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">
            <span>Sign In</span>
          </button>
        </form>
        <p class="auth-switch">
          New here?
          <button class="auth-switch-btn" onclick="showView('register')">Create an account</button>
        </p>
      </div>

      <!-- Register view -->
      <div id="view-register" style="display:none">
        <h2 class="auth-heading">Create account</h2>
        <form class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-name">Your name</label>
            <input type="text" id="reg-name" placeholder="First name"
              autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com"
              autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="At least 6 characters"
              autocomplete="new-password" required minlength="6">
          </div>
          <button type="submit" class="btn-primary" id="register-btn">
            <span>Create Account</span>
          </button>
        </form>
        <p class="auth-switch">
          Already have an account?
          <button class="auth-switch-btn" onclick="showView('login')">Sign in</button>
        </p>
      </div>

    </div>
  </div>

</div>

<!-- ─── App Screen ──────────────────────────────────────────────────────────── -->
<div id="app-screen">
  <header class="app-header">
    <button class="header-back" id="back-btn" onclick="goBack()" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="header-title" id="header-title">Meditations</h1>
    <div class="header-user">
      <button class="header-user-btn" id="user-btn" onclick="toggleUserMenu()" aria-label="Account"></button>
    </div>
  </header>

  <div class="user-menu" id="user-menu">
    <div class="user-menu-name" id="user-menu-name"></div>
    <a class="user-menu-item" href="/bor-timer.html" style="text-decoration:none;color:var(--text);font-weight:700" onclick="document.getElementById('user-menu').classList.remove('visible')">
      ⏱ BOR Timer
    </a>
    <button class="user-menu-item" id="admin-menu-item" style="display:none" onclick="openAdminPanel()">Admin</button>
    <a class="user-menu-item user-menu-donate" href="https://www.paypal.com/donate/?hosted_button_id=L2P56UX8FZ6M8" target="_blank" rel="noopener noreferrer" onclick="document.getElementById('user-menu').classList.remove('visible')">
      <span>🙏</span> Donate
    </a>
    <div class="user-menu-divider"></div>
    <button class="user-menu-item danger" onclick="logout()">Sign Out</button>
  </div>

  <main class="app-content" id="app-content">
    <div class="loading-screen"><div class="spinner"></div></div>
  </main>
</div>

<!-- ─── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
